name: Build and Push Backend Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api.py'
      - 'pipeline.py'
      - 'requirements.txt'
      - 'Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          carbonscope-backend:latest
          carbonscope-backend:${{ github.sha }}

    - name: Trigger Webhook Deployment
      # Add your production server's webhook URL here if applicable (e.g. Render Deploy Hook)
      run: curl -X POST ${{ secrets.DEPLOY_HOOK_URL }} || echo "No deploy hook set"
